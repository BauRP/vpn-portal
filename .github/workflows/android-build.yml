name: Build VPN Elite APK

on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build SPA Web Assets
        # Используем наш исправленный конфиг, который игнорирует серверные ошибки
        run: npx vite build --config vite.spa.config.ts

      - name: Accept Android Licenses
        # ЭТО ВАЖНО: Без этого сборка может зависнуть, запрашивая подтверждение вручную
        run: yes | source /usr/local/lib/android/sdk/tools/bin/sdkmanager --licenses || true

      - name: Initialize Capacitor Android
        # Если папки android нет — создаем. Если есть — просто пропускаем шаг.
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Папка android уже существует, пропускаем инициализацию."
          fi

      - name: Inject Native VPN Manifest
        # Перезаписываем сгенерированный AndroidManifest нашим шаблоном,
        # в котором уже объявлены VpnService, BIND_VPN_SERVICE и
        # FOREGROUND_SERVICE — без них OS блокирует туннель.
        run: |
          if [ -f "android-template/AndroidManifest.xml" ]; then
            cp android-template/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "AndroidManifest.xml заменён шаблоном с VpnService."
          fi

      - name: Capacitor Sync
        # Синхронизируем наш сайт с мобильной оболочкой
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          # Собираем APK в режиме отладки
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPN-Elite-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
