name: Build VPN Elite APK

on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build SPA Web Assets
        # Используем наш исправленный конфиг, который игнорирует серверные ошибки
        run: npx vite build --config vite.spa.config.ts

      - name: Accept Android Licenses
        # ЭТО ВАЖНО: Без этого сборка может зависнуть, запрашивая подтверждение вручную
        run: yes | source /usr/local/lib/android/sdk/tools/bin/sdkmanager --licenses || true

      - name: Initialize Capacitor Android
        # Если папки android нет — создаем. Если есть — просто пропускаем шаг.
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Папка android уже существует, пропускаем инициализацию."
          fi

      - name: Inject Native VPN Manifest
        # Перезаписываем сгенерированный AndroidManifest нашим шаблоном,
        # в котором уже объявлены VpnService, BIND_VPN_SERVICE и
        # FOREGROUND_SERVICE — без них OS блокирует туннель.
        run: |
          if [ -f "android-template/AndroidManifest.xml" ]; then
            cp android-template/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "AndroidManifest.xml заменён шаблоном с VpnService."
          fi

      - name: Capacitor Sync
        # Синхронизируем наш сайт с мобильной оболочкой
        run: npx cap sync android

      - name: Inject Native VPN Java Sources
        # Копируем нативную обвязку (TrivoVpnService + TrivoVpnPlugin)
        # из android-template/java в сгенерированный android/ проект ПОСЛЕ
        # cap sync, чтобы Capacitor не затёр её своими шаблонами.
        run: |
          mkdir -p android/app/src/main/java/com/trivo/vpn
          cp -f android-template/java/com/trivo/vpn/*.java android/app/src/main/java/com/trivo/vpn/
          # Регистрируем плагин в MainActivity
          MAIN_ACT=$(find android/app/src/main/java -name "MainActivity.java" | head -n1)
          if [ -n "$MAIN_ACT" ] && ! grep -q "TrivoVpnPlugin" "$MAIN_ACT"; then
            sed -i 's|import com.getcapacitor.BridgeActivity;|import com.getcapacitor.BridgeActivity;\nimport com.trivo.vpn.TrivoVpnPlugin;|' "$MAIN_ACT"
            sed -i 's|public class MainActivity extends BridgeActivity {|public class MainActivity extends BridgeActivity {\n  @Override public void onCreate(android.os.Bundle s){ registerPlugin(TrivoVpnPlugin.class); super.onCreate(s); }|' "$MAIN_ACT"
          fi

      - name: Inject VPN Core Binaries
        # Скачиваем pre-compiled нативное ядро (sing-box) во время сборки.
        # Если URL недоступен — продолжаем без ядра (Java-обвязка работает,
        # CORE_INJECTION_POINT просто остаётся пустым).
        run: |
          mkdir -p android/app/libs
          curl -fL -o android/app/libs/vpn-core.aar \
            https://github.com/SagerNet/sing-box/releases/download/v1.8.0/sing-box-1.8.0-android-lib.aar \
            || echo "vpn-core.aar download failed — building without core"

      - name: Wire libs/*.aar + LocalBroadcastManager into build.gradle
        run: |
          GRADLE=android/app/build.gradle
          if [ -f "$GRADLE" ]; then
            if ! grep -q "libs.*\.aar" "$GRADLE"; then
              sed -i "/dependencies *{/a\\    implementation fileTree(dir: 'libs', include: ['*.aar'])" "$GRADLE"
            fi
            if ! grep -q "localbroadcastmanager" "$GRADLE"; then
              sed -i "/dependencies *{/a\\    implementation 'androidx.localbroadcastmanager:localbroadcastmanager:1.1.0'" "$GRADLE"
            fi
          fi


      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          # Собираем APK в режиме отладки
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPN-Elite-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
