name: Build VPN Elite APK

on: 
  push:
    branches: [ main, master ] # Сборка сработает при пуше в эти ветки
  workflow_dispatch: # Позволяет запустить сборку вручную кнопкой на GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build SPA Web Assets
        # Господин, здесь мы принудительно используем наш новый конфиг
        run: npx vite build --config vite.spa.config.ts

      - name: Initialize Capacitor Android
        # Если папки android нет, робот создаст её по стандарту
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor Sync
        # Копируем наш "dist" (сайт) в папку мобильного приложения
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          # Даем права на запуск сборщика
          chmod +x gradlew
          # Собираем файл
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPN-Elite-Build
          # Точный путь к готовому файлу
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5 # Файл будет храниться 5 дней
